name: tasks
description: "A graph based task manager"
publish_to: 'none'
version: 0.2.2

environment:
  sdk: ^3.11.0

dependencies:
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_platform_widgets: ^9.0.0
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  package_info_plus: ^9.0.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  # adaptive_icon_background: "#FFFFFF" 
  # adaptive_icon_foreground: "assets/images/icon_foreground.png"